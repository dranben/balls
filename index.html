<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Storage | Dranben.com</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-container">
            <div id="auth-section">
                <button id="login-btn" onclick="window.location.href='https://id.twitch.tv/oauth2/authorize?client_id=oqdrp3gkw3lczkb14z6h74ycboupib&redirect_uri=https://dranben.com&response_type=code&scope=user:read:email'">
                    LOGIN WITH TWITCH
                </button>
                <span id="user-display" style="display:none;"></span>
            </div>
            
            <div class="search-trainer">
                <input type="text" id="username-input" placeholder="Search Trainer Name...">
                <button onclick="fetchTrainerData(document.getElementById('username-input').value)">GO</button>
            </div>
        </div>
    </header>

    <main id="trainer-card">
        <div class="card-header">
            <h1 id="trainer-display-title">TRAINER NAME: <span id="trainer-name">DRANBEN</span></h1>
            <p class="subtitle">Pokemon Twitch Chat RPG</p>
        </div>

        <div class="trainer-stats-bar">
            <div class="stat-item">
                <span class="label">TOTAL CAUGHT:</span>
                <span id="stat-total" class="value">0</span>
            </div>
            <div class="stat-item">
                <span class="label">BALANCE:</span>
                <span class="value">₽</span><span id="stat-balance" class="value">0</span>
            </div>
        </div>

        <div class="controls-row">
            <input type="text" id="pokemon-filter" placeholder="Filter by Name...">
            <select id="sort-order">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="pokedex">Pokédex #</option>
                <option value="alpha">A-Z</option>
                <option value="shiny">Shinies</option>
            </select>
        </div>

        <hr class="divider">
        <div class="favorites-container">
            <h2 class="favorites-title">FAVORITE POKÉMON</h2>
            <div id="favorites-slots" class="favorites-grid">
                <div class="fav-slot" id="fav-0"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"></div>
                <div class="fav-slot" id="fav-1"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"></div>
                <div class="fav-slot" id="fav-2"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"></div>
                <div class="fav-slot" id="fav-3"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"></div>
            </div>
        </div>
        
        <hr class="divider">
        <div id="pokemon-display"></div>
        
    </main>

    <script src="script.js"></script>
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <p id="modal-text">Are you sure?</p>
            <div class="modal-buttons">
                <button id="modal-btn-yes" class="neon-btn">YES</button>
                <button id="modal-btn-no" class="neon-btn red-btn">NO</button>
            </div>
        </div>
    </div>
</body>
</html>
